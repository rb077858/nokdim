<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפת נוקדים בתלת מימד - GitHub Pages</title>
    
    <!-- טעינת הספרייה והעיצוב של Cesium לגרפיקה תלת ממדית -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
        body, html, #cesiumContainer {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }
    </style>
</head>
<body>

    <div id="cesiumContainer"></div>

    <script>
        // הארכיטקטורה החדשה של Cesium דורשת יצירה אסינכרונית של תוואי שטח
        async function initMap() {
            
            // 1. יצירת תוואי השטח (ההרים והגבעות) בשיטה המודרנית
            let terrainProvider;
            try {
                terrainProvider = await Cesium.createWorldTerrainAsync();
            } catch (error) {
                console.log("לא ניתן היה לטעון את תוואי השטח של Cesium, ממשיך ללא תלת מימד: ", error);
            }

            // 2. אתחול הגלובוס עם מפת לוויין פתוחה של Esri ותוואי השטח החדש
            const viewer = new Cesium.Viewer('cesiumContainer', {
                terrainProvider: terrainProvider, 
                baseLayerPicker: false,
                imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
                    url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
                }),
                timeline: false,
                animation: false,
                navigationHelpButton: false,
                sceneModePicker: false
            });

            // 3. הגדרת גבולות התמונה המדויקים שלך בנוקדים
            const south = 31.640908;
            const west = 35.241278;
            const north = 31.651078;
            const east = 35.252514;

            const rectangle = Cesium.Rectangle.fromDegrees(west, south, east, north);

            // 4. טעינת התמונה מהתיקייה המקומית בתוך nokdim
            const localImageUrl = './image.png';

            viewer.imageryLayers.addImageryProvider(new Cesium.SingleTileImageryProvider({
                url: localImageUrl,
                rectangle: rectangle
            }));

            // 5. מיקוד אוטומטי של המצלמה מעל נוקדים בזווית תלת-ממדית מוטה
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(35.2468, 31.6420, 1500.0), // מיקום וגובה המצלמה במטרים
                orientation: {
                    heading: Cesium.Math.toRadians(0.0),  // מבט פונה לצפון
                    pitch: Cesium.Math.toRadians(-40.0),  // זווית הטיה ב-40 מעלות
                    roll: 0.0
                }
            });
        }

        // הפעלת הפונקציה מיד עם טעינת הדף
        initMap();
    </script>
</body>
</html>
