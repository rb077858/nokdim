<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפת נוקדים בתלת מימד מלא - GitHub Pages</title>
    
    <!-- טעינת הספרייה והעיצוב של Cesium -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
        body, html, #cesiumContainer {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }
    </style>
</head>
<body>

    <div id="cesiumContainer"></div>

    <script>
        // הדבק כאן את הטוקן שהעתקת מהאתר של Cesium
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJiMjZkMWY2Ni00ZjVlLTQ1ZjQtODllNC1kNTFiMjNjNWQwOGMiLCJpZCI6NDU0NTc4LCJzdWIiOiJyYjA3Nzg1OCIsImlzcyI6Imh0dHBzOi8vYXBpLmNlc2l1bS5jb20iLCJhdWQiOiJVbnRpdGxlZCIsImlhdCI6MTc4MzYxOTkxN30.G-uChZzXxy9VtCLS3fQ1oW_tf70lt_KIHC1E5WUIz3g';

        async function initMap() {
            let terrainProvider;
            try {
                // עכשיו כשיש טוקן, בקשת השטח התלת-ממדי תאושר בהצלחה!
                terrainProvider = await Cesium.createWorldTerrainAsync();
            } catch (error) {
                console.log("שגיאה בטעינת תוואי השטח: ", error);
            }

            // אתחול הגלובוס עם מפת לוויין ותוואי השטח התלת-ממדי
            const viewer = new Cesium.Viewer('cesiumContainer', {
                terrainProvider: terrainProvider, 
                baseLayerPicker: false,
                imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
                    url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
                }),
                timeline: false,
                animation: false,
                navigationHelpButton: false,
                sceneModePicker: false
            });

            // גבולות המפה שלך בנוקדים
            const south = 31.640908;
            const west = 35.241278;
            const north = 31.651078;
            const east = 35.252514;

            const rectangle = Cesium.Rectangle.fromDegrees(west, south, east, north);
            const localImageUrl = './image.png';

            // הלבשת המפה שלך
            viewer.imageryLayers.addImageryProvider(new Cesium.SingleTileImageryProvider({
                url: localImageUrl,
                rectangle: rectangle
            }));

            // מיקוד המצלמה בזווית תלת-ממדית מוטה (מבט אל עבר האופק וההרים)
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(35.2468, 31.6390, 1000.0), // מיקום נמוך וקרוב יותר
                orientation: {
                    heading: Cesium.Math.toRadians(0.0),   // מבט פונה לצפון
                    pitch: Cesium.Math.toRadians(-30.0),  // זווית הטיה חדה יותר כדי לראות את ההרים בבירור
                    roll: 0.0
                }
            });
        }

        initMap();
    </script>
</body>
</html>
