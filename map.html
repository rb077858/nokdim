<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפת נוקדים בתלת מימד</title>
    
    <!-- טעינת הספרייה והעיצוב של Cesium לגרפיקה תלת ממדית -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
        body, html, #cesiumContainer {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }
    </style>
</head>
<body>

    <div id="cesiumContainer"></div>

    <script>
        // 1. אתחול הגלובוס התלת-ממדי עם מפת לוויין כברירת מחדל
        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: Cesium.createWorldTerrain(), // טעינת טופוגרפיה והרים בתלת מימד
            baseLayerPicker: false, // ביטול כפתור החלפת שכבות מיותר
            imageryProvider: new Cesium.IonImageryProvider({ assetId: 2 }), // מפת לוויין איכותית של Bing
            timeline: false, // הסרת סרגל הזמן למטה
            animation: false, // הסרת כפתורי האנימציה
            navigationHelpButton: false, // הסרת כפתור העזרה
            sceneModePicker: false // נעילה על מצב תלת מימד בלבד
        });

        // 2. הגדרת גבולות התמונה המדויקים שנתת (המרנו אותם לרדיאנים עבור המנוע התלת ממדי)
        const south = 31.640908;
        const west = 35.241278;
        const north = 31.651078;
        const east = 35.252514;

        const rectangle = Cesium.Rectangle.fromDegrees(west, south, east, north);

        // 3. הלבשת התמונה שלך כשכבה על גבי הלוויין והטופוגרפיה התלת ממדית
        const updatedImageUrl = 'https://r.is-cool.dev/nokdim/image.png';

        viewer.imageryLayers.addImageryProvider(new Cesium.SingleTileImageryProvider({
            url: updatedImageUrl,
            rectangle: rectangle
        }));

        // 4. מיקוד המצלמה אוטומטית מעל נוקדים בזווית תלת-ממדית מוטה (Pitch)
        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(35.2468, 31.6420, 1200.0), // מיקום וגובה המצלמה במטרים
            orientation: {
                heading: Cesium.Math.toRadians(0.0), // כיוון צפון
                pitch: Cesium.Math.toRadians(-35.0), // זווית הטיה למטה (מבט אל האופק התלת ממדי)
                roll: 0.0
            }
        });
    </script>
</body>
</html>
