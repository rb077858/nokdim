<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפת נוקדים בתלת מימד - GitHub Pages</title>
    
    <!-- טעינת הספרייה והעיצוב של Cesium לגרפיקה תלת ממדית -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
        body, html, #cesiumContainer {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }
    </style>
</head>
<body>

    <div id="cesiumContainer"></div>

    <script>
        // 1. אתחול הגלובוס עם מפת לוויין פתוחה של Esri (לא דורשת מפתח גישה)
        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: Cesium.createWorldTerrain(), // הפעלת טופוגרפיה והרים בתלת מימד
            baseLayerPicker: false,
            imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
                url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
            }),
            timeline: false,
            animation: false,
            navigationHelpButton: false,
            sceneModePicker: false
        });

        // 2. הגדרת גבולות התמונה המדויקים על פי נתוני ה-KML שלך בנוקדים
        const south = 31.640908;
        const west = 35.241278;
        const north = 31.651078;
        const east = 35.252514;

        const rectangle = Cesium.Rectangle.fromDegrees(west, south, east, north);

        // 3. טעינת התמונה מנתיב יחסי - מאחר והיא נמצאת באותה תיקייה בדיוק של ה-html
        const localImageUrl = './image.png';

        viewer.imageryLayers.addImageryProvider(new Cesium.SingleTileImageryProvider({
            url: localImageUrl,
            rectangle: rectangle
        }));

        // 4. מיקוד אוטומטי של המצלמה מעל נוקדים בזווית תלת-ממדית מוטה
        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(35.2468, 31.6420, 1500.0), // מיקום וגובה המצלמה במטרים
            orientation: {
                heading: Cesium.Math.toRadians(0.0),  // מבט פונה לצפון
                pitch: Cesium.Math.toRadians(-40.0),  // זווית הטיה ב-40 מעלות כדי לראות את התלת מימד
                roll: 0.0
            }
        });
    </script>
</body>
</html>
